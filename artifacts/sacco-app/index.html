<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Bash M. Money And Financial Services Ltd</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="512x512" href="/app-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="shortcut icon" href="/app-icon.png" />

    <!-- Theme colour (Android address bar + splash) -->
    <meta name="theme-color" content="#1A365D" />
    <meta name="application-name" content="Bash M. Money" />
    <meta name="description" content="SACCO digital banking and financial management platform by Bash M. Money And Financial Services Ltd." />

    <!-- iOS PWA — makes the app behave like a native app from the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BMMFS" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128x128.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />

    <!-- Windows / Microsoft tiles -->
    <meta name="msapplication-TileColor" content="#1A365D" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bash M. Money And Financial Services Ltd" />
    <meta property="og:description" content="SACCO digital banking and financial management platform." />
    <meta property="og:image" content="/bmm-logo-original.jpeg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker: actively unregister all workers and clear caches to prevent stale blank screens -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var reg of registrations) { reg.unregister(); }
        });
        caches.keys().then(function(keys) {
          keys.forEach(function(key) { caches.delete(key); });
        });
      }
    </script>
  </body>
</html>
